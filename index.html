<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>神聖色数カラー鑑定</title>
<style>
:root{
  --bg:#f7f4ef; --panel:#fffdf9; --ink:#3a3330; --sub:#8a7f76;
  --line:#e6ddd0; --accent:#b08d57; --accent-d:#8a6d3f;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;line-height:1.8}
.wrap{max-width:900px;margin:0 auto;padding:24px 18px 80px}
h1{font-size:1.5rem;letter-spacing:.18em;text-align:center;margin:.2em 0 .1em;font-weight:600}
.lead{text-align:center;color:var(--sub);font-size:.82rem;letter-spacing:.14em;margin-bottom:26px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:22px 22px;margin-bottom:22px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
label{font-size:.8rem;color:var(--sub);letter-spacing:.08em}
input,select{font:inherit;padding:9px 11px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink)}
.tcheck{display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--sub);margin-top:4px}
.tcheck input{width:auto}
.btn{display:block;width:100%;margin-top:18px;padding:13px;border:0;border-radius:10px;
  background:var(--accent);color:#fff;font:inherit;font-size:1rem;letter-spacing:.2em;
  cursor:pointer;transition:.2s}
.btn:hover{background:var(--accent-d)}
.note{font-size:.74rem;color:var(--sub);margin-top:10px;text-align:center}
#result{display:none}
.sec-title{text-align:center;letter-spacing:.2em;font-size:1.05rem;margin:34px 0 14px;
  color:var(--accent-d);font-weight:600}
.sec-title.fig{font-size:1.55rem;letter-spacing:.28em}
.client-bar{display:flex;flex-wrap:wrap;gap:6px 26px;justify-content:center;
  font-size:.84rem;color:var(--sub);border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.client-bar b{color:var(--ink);font-weight:600}
/* diagram */
.diagram-wrap{display:flex;justify-content:center}
svg.fol{width:min(100%,560px);height:auto;display:block}
.summary{flex:1;min-width:220px}
.sumrow{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;margin-bottom:10px;background:#fff}
.swatch{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex:none}
.sumrow .lab{font-size:.8rem;color:var(--sub);letter-spacing:.1em}
.sumrow .val{font-size:1.05rem;font-weight:600}
.sumrow .num{margin-left:auto;font-size:1.4rem;font-weight:700;color:var(--accent-d)}
/* reading */
.read{margin-bottom:16px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.read-head{display:flex;align-items:center;gap:12px;padding:12px 16px}
.read-head .cat{font-size:.95rem;font-weight:600;letter-spacing:.06em}
.read-head .cn{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.86rem}
.read-head .cn .sw{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.2)}
.read-body{padding:0 18px 16px}
.tagline{font-size:.92rem;color:var(--accent-d);margin:2px 0 8px;font-weight:600}
.desc{font-size:.86rem;margin:0 0 9px}
.desc.soft{color:var(--sub)}
.advice{font-size:.86rem;margin:12px 0 0;color:var(--accent-d);font-weight:600;
  background:#f4ede0;border:1px solid #e6d8bd;border-radius:9px;padding:11px 14px}
@media(max-width:620px){.form-grid{grid-template-columns:1fr}}
.foot{text-align:center;font-size:.72rem;color:var(--sub);margin-top:30px;letter-spacing:.1em}
.disclaimer{text-align:center;font-size:.74rem;color:var(--sub);margin-top:22px;line-height:1.7}
.err{background:#fbeaea;border:1px solid #e0b4b4;color:#9b3a3a;padding:12px 14px;
  border-radius:8px;font-size:.85rem;margin-top:14px;display:none}
.pdfbar{display:flex;justify-content:flex-end;gap:10px;margin:6px 0 18px}
.pdfbtn{padding:10px 22px;border:0;border-radius:9px;background:var(--accent);
  color:#fff;font:inherit;font-size:.92rem;letter-spacing:.14em;cursor:pointer;transition:.2s}
.pdfbtn:hover{background:var(--accent-d)}
@media print{
  @page{size:A4;margin:11mm}
  html,body{background:#fff!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .wrap{max-width:none;padding:0}
  h1,.lead,.input-card,.btn,.pdfbar,.foot,.err,.note{display:none!important}
  #result{display:block!important}
  .card{break-inside:avoid;break-after:page;box-shadow:none;border:0;padding:0;margin:0}
  .client-bar{font-size:.82rem;gap:5px 24px;padding-bottom:12px;margin-bottom:16px}
  .sec-title{margin:10px 0 8px;break-after:avoid}
  .sec-title.fig{font-size:1.5rem;margin:6px 0 14px}
  .diagram-wrap{margin:0}
  svg.fol{break-inside:avoid;width:auto;height:188mm;margin:0 auto}
  .read{break-inside:avoid;box-shadow:none;margin-bottom:10px}
  .read-head{padding:9px 14px}
  .read-body{padding:0 14px 11px}
  .tagline{font-size:.84rem;margin:2px 0 6px}
  .desc{font-size:.8rem;margin:0 0 6px}
  .advice{font-size:.8rem;margin:9px 0 0;padding:9px 12px}
  .disclaimer{margin-top:14px}
}
#authgate{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:24px}
#authgate .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:34px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
#authgate h2{font-size:1.2rem;letter-spacing:.16em;margin:.2em 0 .1em;font-weight:600;color:var(--ink)}
#authgate .sub{font-size:.78rem;color:var(--sub);letter-spacing:.1em;margin-bottom:22px}
#authgate input{font:inherit;width:100%;padding:11px 12px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);text-align:center;letter-spacing:.08em}
#authgate button{margin-top:16px;width:100%;padding:12px;border:0;border-radius:10px;
  background:var(--accent);color:#fff;font:inherit;font-size:1rem;letter-spacing:.2em;cursor:pointer}
#authgate button:hover{background:var(--accent-d)}
#authgate .ae{display:none;margin-top:14px;font-size:.82rem;color:#9b3a3a;
  background:#fbeaea;border:1px solid #e0b4b4;border-radius:8px;padding:10px}
body.locked{overflow:hidden}
body.locked .wrap{filter:blur(6px);pointer-events:none;user-select:none}
@media print{#authgate{display:none!important}}
</style>
</head>
<body class="locked">
<div id="authgate">
  <div class="box">
    <h2>神聖色数カラー鑑定</h2>
    <div class="sub">ご利用にはキーフレーズの入力が必要です</div>
    <input id="ak" type="password" placeholder="キーフレーズを入力" autocomplete="off"
      onkeydown="if(event.key==='Enter')authCheck()">
    <button onclick="authCheck()">認 証</button>
    <div class="ae" id="ae"></div>
  </div>
</div>
<script src="auth-keys.js"></script>
<script>
/* ===== 認証（ハッシュ照合）=====
   キー本体は同階層の auth-keys.js（SHA-256ハッシュのみ。平文は非保持）。
   キーの追加・期限変更は auth-keys.js を差し替えるだけ（gen-key.js で生成）。 */
function _sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),res='';
  var words=[],bitLen=ascii.length*8;
  var hash=_sha256.h=_sha256.h||[],k=_sha256.k=_sha256.k||[],pc=k.length;
  var comp={};
  for(var c=2;pc<64;c++){
    if(!comp[c]){
      for(var i=0;i<313;i+=c){comp[i]=c;}
      hash[pc]=(mp(c,.5)*mw)|0; k[pc++]=(mp(c,1/3)*mw)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(var i=0;i<ascii.length;i++){
    var j=ascii.charCodeAt(i);
    if(j>>8)return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=((bitLen/mw)|0);
  words[words.length]=(bitLen);
  for(var j=0;j<words.length;){
    var w=words.slice(j,j+=16);
    var oh=hash; hash=hash.slice(0,8);
    for(var i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2];
      var a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]
          +(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash); hash[4]=(hash[4]+t1)|0;
    }
    for(var i=0;i<8;i++){hash[i]=(hash[i]+oh[i])|0;}
  }
  for(var i=0;i<8;i++){
    for(var j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      res+=((b<16)?0:'')+b.toString(16);
    }
  }
  return res;
}
function _utf8(s){return unescape(encodeURIComponent(s));}
function authToday(){return new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'});}
function authCheck(){
  const ae=document.getElementById('ae');
  if(typeof AUTH_HASHES==='undefined'){
    ae.textContent="認証ファイル(auth-keys.js)が読み込めません。同じ場所に配置してください。";
    ae.style.display="block"; return;
  }
  const v=(document.getElementById('ak').value||"").trim();
  if(!v){ ae.textContent="キーフレーズを入力してください。"; ae.style.display="block"; return; }
  const hx=_sha256(_utf8((typeof AUTH_SALT!=='undefined'?AUTH_SALT:"")+v));
  const today=authToday();
  const hit=AUTH_HASHES.find(k=>k.h===hx);
  if(!hit){ ae.textContent="キーフレーズが正しくありません。"; ae.style.display="block"; return; }
  if(today>hit.expires){
    ae.textContent="このキーフレーズは有効期限が切れています（期限: "+hit.expires+"）。";
    ae.style.display="block"; return;
  }
  document.getElementById('authgate').style.display="none";
  document.body.classList.remove('locked');
}
</script>
<div class="wrap">
  <h1>神聖色数カラー鑑定</h1>
  <div class="lead">月とカラーとナンバーで知る私</div>

  <div class="card input-card">
    <div class="form-grid">
      <div class="field"><label>お名前</label><input id="f_name" placeholder="例：山田 花子"></div>
      <div class="field"><label>敬称</label>
        <select id="f_title"><option>さま</option><option>さん</option><option>様</option><option value="">（なし）</option></select></div>
      <div class="field"><label>生年月日</label><input id="f_date" type="date"></div>
      <div class="field"><label>出生時刻</label><input id="f_time" type="time">
        <div class="tcheck"><input type="checkbox" id="f_unknown"><label for="f_unknown" style="margin:0">出生時刻が不明</label></div>
      </div>
      <div class="field"><label>出生場所（都道府県）</label><select id="f_pref"></select></div>
      <div class="field"><label>鑑定日</label><input id="f_jdate" type="date"></div>
      <div class="field"><label>鑑定者</label><input id="f_reader" placeholder="鑑定士名"></div>
    </div>
    <button class="btn" id="go">鑑 定 す る</button>
    <div class="err" id="err"></div>
    <div class="note">出生時刻が不明な場合は 12:00 で計算します。時刻は日本標準時(JST)として扱います。</div>
  </div>

  <div id="result"></div>
  <div class="foot">© いろみずきカラー協会　神聖色数鑑定</div>
</div>

"喜びを基準に選ぶほど、人と機会が自然に集まってきます。", "あれこれと手を広げすぎて、全体のまとまりを欠いてしまうことがあるようです。"], ["過去を糧に変える再生力で、こだわりも軽やかに手放していけます。", "明るさと社交性で、停滞した流れを楽しく動かし直せます。", "執着や所有したい気持ちが出ると、過去や物事を手放しにくくなるところがあります。"], ["その求心力を健やかに使えば、人が集う豊かな場を生み出せます。", "経験に裏打ちされた自信で、周りを前向きに引っ張れます。", "人とのつながりを大切にするあまり、相手を囲い込みたくなる気持ちが強まる面があります。"], ["本来は自分の足で立ち、人と対等に繋がる力を備えています。", "縁を広げ人をまとめる、あたたかなハブのような存在です。", "自信を失うと人に頼りきりになり、共依存の関係に傾きやすいところがあります。"], ["自分軸でいられるとき、自立と喜びが両立し、人を明るく繋ぐ太陽のような存在になります。", "コミュニティをつくる才能が、人を明るく結ぶ力になります。", "目先の楽しさに流れやすく、心の深い充足を見失ってしまうことがあるようです。"]], "ゴールド": [["内側から輝く自己価値と知恵を持つ主人格。本質を見極め、存在そのもので人を惹きつけるタイプです。", "学んだ知識が多くの体験を通して、揺るがない知恵に変わっています。", "物事の本質を求めるあまり、最初の一歩を踏み出すまでに時間がかかる面があります。"], ["学びを知恵に変え、ありのままの輝きを発揮することで、人と豊かさが自然に引き寄せられていきます。", "表面に惑わされず本物を識別する、知恵の光を持っています。", "自分が納得するまで動けず、せっかくの機会を逃してしまうことがあるようです。"], ["無意識の奥に、真実を見抜き本物を識別する叡智が働いています。", "無意識の奥で、自分の本質と価値を確かめようとする働きがあります。", "理由のはっきりしない不安が内側でふと揺らぎ、落ち着かなくなるところがあります。"], ["物事の本質を深く見抜き、表面的なことに惑わされず識別して伝えます。", "核心を突き、表面的なごまかしを見抜いて言葉にします。", "核心をまっすぐ突く分、その言葉が相手に重く響いてしまうことがあるようです。"], ["相手の本当の価値に気づかせ、内面から輝かせる愛し方をします。", "相手の内側の価値を映し出し、その人を本来の輝きへ促します。", "相手の価値を無意識に量り、心の距離を測ってしまいやすい一面があります。"], ["高貴さ・重厚感・本物の輝きに美を感じます。華やかで品格のあるものを好みます。", "時を経ても色あせない、本物・本質の質感に美を感じます。", "本物志向が強い分、こだわりが過ぎて少し窮屈になってしまうことがあるようです。"], ["研究熱心に深く掘り下げ、納得した本質に向けて存在感をもって動きます。", "納得いくまで深く掘り下げてから動く、研究者気質があります。", "深く掘り下げることに没頭しすぎて、腰が重くなりやすいところがあります。"], ["ありのままの自分で輝くほど人とお金が集まります。自己価値を信頼することが幸運の鍵です。", "ありのままで輝くほど、人とお金が引き寄せられていきます。", "自分の価値をふと疑ったとき、進む足が止まってしまうことがあるようです。"], ["本質を見抜く眼で、揺らぎの原因も冷静に見極められます。", "「ありのままで十分」と思えたとき、迷いは確かな自信に変わります。", "自己卑下と自信過剰の間で気持ちが揺れ、安定しにくいところがあります。"], ["等身大に戻れば、その存在感は人を導く本物の知恵になります。", "深く掘り下げて識別する力で、表面に流されず判断できます。", "自分を実際より大きく見せようとして、かえって本質を見失いやすい面があります。"], ["内なる輝きを思い出すほど、価値を外に求めず立てます。", "学びを知恵に変え、人と豊かさを引き寄せる力を備えています。", "漠然とした恐れや混乱に飲まれると、自分の価値に気づけなくなることがあります。"], ["自分軸でいられるとき、知恵の光が自然に周りを照らし、人の価値に気づかせる人になります。", "自分の価値への信頼が、人の価値を照らす光に変わります。", "自分への信頼が揺らぐと、本来の輝きをそっと内に隠してしまうことがあります。"]], "イエロー": [["太陽のように明るく知的な主人格。ユーモアと明晰さで場の中心となり、個性を発揮するタイプです。", "「自己を知る」ことを通して、人との違いに気づいていく色です。", "考えが次々と回りすぎて、なかなか決めきれなくなってしまう面があります。"], ["学びを楽しんで消化し、自分を知ることで個性を生き、希望や夢を周囲に与えていきます。", "学びを消化し理解することで、自分らしさを明確にしていきます。", "完璧を求めるあまり、本来の楽しさをふと忘れてしまうことがあるようです。"], ["無意識の奥に、暗闇にも光を見出すポジティブさと旺盛な知的好奇心が働いています。", "無意識の奥に、暗闇にも光を見出す前向きさが備わっています。", "内側で不安や心配が頭の中をぐるぐるとめぐりやすいところがあります。"], ["明晰に物事を見て素早く決断し、機知とユーモアで人を楽しませる伝え方をします。", "明晰に状況を読み、ユーモアを交えて素早く判断を示します。", "理屈が先に立ちやすく、話がいつの間にか複雑になりすぎることがあります。"], ["明るく軽やかに、一緒に笑い楽しむ関係を育てる愛し方をします。", "深刻になりすぎず、笑いを分かち合える関係を心地よく感じます。", "軽やかさを好む分、深く重い情緒に触れるのを避けがちな一面があります。"], ["明るさ・知的さ・遊び心に美を感じます。エンターテイメント性のあるものを好みます。", "知的さと遊び心が同居した、軽やかな表現に美を感じます。", "知的さを優先するあまり、感覚で味わう楽しみを後回しにしがちなところがあります。"], ["わくわくすることに躍動的に動き、のびのびと個性を表現するエネルギーがあります。", "わくわくする対象には、躍動的にのびのびと取り組みます。", "興味があちこちに散りやすく、ひとつに集中し続けるのが少し苦手です。"], ["自分が本当に喜び楽しめる学びを深めるほど発展します。陽気でいることが幸運を呼びます。", "本当に楽しめる学びほど、消化されて大きな力に育ちます。", "考えすぎて慎重になり、行動がつい後手に回ってしまうことがあるようです。"], ["明晰さで自分の思考を俯瞰でき、混乱も整理して抜け出せます。", "楽しむ視点を取り戻せば、知性は軽やかな強みに変わります。", "情報が処理しきれないと混乱や緊張が出て、空回りしやすいところがあります。"], ["その頭脳を皆で喜ぶ方へ使えば、場を照らす光になります。", "素早い判断と機知で、停滞した空気を明るく動かせます。", "自分の利益のために、つい周りを思いどおりに動かしたくなる面があります。"], ["本来は自分の喜びを羅針盤に、個性を発揮できる人です。", "学びを消化し希望を配る、太陽のような明るさを持っています。", "人の目が気になりすぎて、自分らしさを出せず緊張してしまうことがあります。"], ["自分軸でいられるとき、知性と喜びが輝きとなり、人に希望を与える太陽のような人になります。", "自分を知る明晰さが、人に希望と光を手渡す力になります。", "楽しむ感覚を忘れると、思考に偏って肩に力が入りやすいところがあります。"]], "オリーブ": [["知性と感性を併せ持つ、しなやかなリーダーの主人格。周囲に希望の光をもたらすタイプです。", "グリーンの感性とイエローの知性、両方を兼ね備えた色です。", "何でも背負い込みやすく、力をふっと抜くところを見失いがちな面があります。"], ["全員が活きる仕組みを創り、困難も乗り越えて実務的に道を切り拓き自己実現していきます。", "過酷な環境で育つオリーブの木のように、困難を糧に成熟します。", "完璧を求めるあまり、自分を厳しく追い込みすぎてしまうことがあるようです。"], ["無意識の奥に、苦みを甘みへ変える変容と、こつこつ育てる粘り強さが働いています。", "無意識の奥で、苦みを甘みへ変える変容のプロセスが進んでいます。", "内に苦さを抱え込みやすく、それを言葉にして表に出すのが少し苦手です。"], ["全体の調和を見ながら自己主張もでき、人の才能を引き出す伝え方をします。", "全体の調和を見ながらも、必要な自己主張はきちんとできます。", "正しさを大切にする分、言葉が正論に寄って相手へ厳しく響くことがあります。"], ["見捨てず励まし、共に成長していく深く思いやりのある愛し方をします。", "すぐに結果を求めず、励まし続けて共に育つ関係を築きます。", "相手を見守るあまり、自分の寂しさをなかなか言い出せない一面があります。"], ["自然な調和・実りある成熟・落ち着いた品に美を感じます。", "派手さより、実りある成熟と落ち着いた佇まいに美を感じます。", "落ち着いた実りを好む分、華やかさや楽しさを遠ざけてしまいがちなところがあります。"], ["折れないしなやかさで、長い時間をかけてでも着実にやり遂げるエネルギーがあります。", "短距離より長距離型で、時間をかけて確実に積み上げます。", "長丁場で気を張りつめすぎて、知らぬ間に疲れを溜めやすいところがあります。"], ["チームで繋がり、人の夢を応援するほど発展します。世のため人のための働きが幸運を呼びます。", "仲間と繋がりチームで達成するほど、世界が広がります。", "堅実さを大切にする分、大きく踏み広げるのに少し勇気がいることがあります。"], ["しなやかな粘りで、完璧主義の重さも少しずつ手放せます。", "困難を糧に成熟する、折れない強さを備えています。", "頑固さが出ると視野が狭まり、周りが見えにくくなってしまう面があります。"], ["その厳しさを導きに変えれば、人を育てる頼れる力になります。", "全体を見て調整しつつ自己主張もできる、稀有なバランス感覚です。", "自分にも人にも基準が高く、つい厳しくなりすぎてしまうところがあります。"], ["本来は弱さも見せながら人を率いる、芯のある人です。", "仲間と繋がりチームで実らせる、確かな実務力があります。", "強がってしまい、弱さや本音をなかなか人に見せられない一面があります。"], ["自分軸でいられるとき、しなやかな強さで人を率い、新しい時代を拓くリーダーになります。", "しなやかさと実務力が、新時代を拓くリーダーシップになります。", "力を緩めると不安になり、また気を張りつめてしまうことがあるようです。"]], "グリーン": [["自然体で調和を保つ主人格。広い視野で物事を捉え、心にゆとりを持って生きるタイプです。", "自然な境界線を持ち、自分の時間と空間でこそ力を取り戻します。", "穏やかさを大切にする分、決断までにゆっくり時間がかかる面があります。"], ["ありのままの自分でいることで、ハートから真の方向性を選び自己実現していきます。", "広く全体を見て、ハートから真の方向性を選び取ります。", "方向をなかなか選びきれず、その場で足踏みしてしまうことがあるようです。"], ["無意識の奥に、感情をやわらげ真の自分を取り戻す再生と癒しの力が働いています。", "無意識の奥で、怒りや悲しみをやわらげる再生が働いています。", "感情を内側に抱え込み、ひとりでそっとためてしまいやすいところがあります。"], ["全体を広く見て中庸に捉え、相手に寄り添う穏やかな伝え方をします。", "偏らず中庸に捉え、相手の呼吸に合わせて穏やかに伝えます。", "角を立てまいとするあまり、本音を言わずに飲み込んでしまう一面があります。"], ["相手をありのまま認め、心地よい距離で共にいる自然体の愛し方をします。", "距離感を大切にし、互いの自然体を尊重する関係を好みます。", "相手に合わせすぎて、いつの間にか自分の輪郭が薄れてしまうことがあります。"], ["自然・ナチュラル・調和に美を感じます。和やかで余白のある空間を好みます。", "余白・ナチュラル・調和のとれた空気に美を感じます。", "調和を優先する分、自分の好みや主張をつい控えめにしがちなところがあります。"], ["焦らず自然なリズムで動き、その場の空気を和ませるエネルギーがあります。", "焦らず自然なリズムで動き、停滞も再生の一部と捉えます。", "急かされると本来のリズムが乱れ、調子を崩しやすいところがあります。"], ["自分の時間と空間を大切にしリラックスするほど発展します。自然体でいることが幸運を呼びます。", "リラックスして自分を取り戻すほど、流れが整っていきます。", "今の心地よさに馴染むあまり、新しい一歩が遅れがちな面があります。"], ["広い視野で全体を見渡し、急がず最善の道を選び直せます。", "自分の軸を言葉にできたとき、優しさは芯のある強さになります。", "人に合わせすぎて優柔不断になり、八方美人に傾きやすいところがあります。"], ["関わる勇気を持てば、その調和力は人を結ぶ才能になります。", "場を和ませ対立をほどく、自然なまとめ役の素質があります。", "関わりをそっと避けて、物事を先延ばしにしてしまいやすい面があります。"], ["本来はありのままを認め、心地よい距離を保てる人です。", "ネガティブを和らげ本来へ還す、得がたい癒しの力を持っています。", "相手に同調しすぎて、自分の意見がぼやけてしまうことがあるようです。"], ["自分軸でいられるとき、揺るがぬ調和の中心となり、人を癒し本来へ還す人になります。", "ネガティブをポジティブへ変える力が、人を本来へ還す才能になります。", "自分の軸が緩むと、再び周囲に流されやすくなってしまうところがあります。"]], "ターコイズ": [["ハートで感じたことを自由に表現する主人格。軽やかで創造的、自分らしさを生きるタイプです。", "グリーンのハートとブルーの伝達、その間に位置する色です。", "自由をのびのび求める分、枠や束縛のある場が少し苦手な面があります。"], ["心が感じたものを増幅して表現し、個性を発揮することで社会に役立ち自己実現していきます。", "心が感じたものを増幅し、自分らしい形で外へ表していきます。", "形にしてやり遂げる前に、次の興味へと心が移りやすいところがあります。"], ["無意識の奥に、滞りを解放し自由に流れようとする創造のエネルギーが働いています。", "無意識の奥で、滞りを解いて自由に流れたい衝動が動いています。", "感情を抑え込むと、内側にエネルギーが詰まりやすくなる傾向があります。"], ["言葉を超えた感覚で大勢に伝える表現力。芸術的で直感的なコミュニケーションをします。", "言葉を超えた感覚で、絵・音・場づくりなど多彩に表現します。", "感覚で捉えるのが得意な分、理屈で順序立てて説明するのが少し苦手です。"], ["自由を尊重し、分かち合いを楽しむ軽やかな愛し方をします。", "束縛を嫌い、互いの自由を尊ぶ軽やかな関係を好みます。", "距離を置きたくなりやすく、関係に深く入り込むのを避ける一面があります。"], ["自由・即興・芸術的表現に美を感じます。海のような開放感を好みます。", "即興性と開放感、海のような自由さに美を感じます。", "自由な感性を大切にする分、計画性が後回しになりがちなところがあります。"], ["流れに乗って軽やかに動き、エネルギーの滞りを解き放つ力があります。", "流れに乗ると本領を発揮し、エネルギーの滞りを解き放ちます。", "流れに身を任せやすく、地に足をつけて進めるのが少し苦手なところがあります。"], ["ハートの声に従い自分らしく表現するほど発展します。自由に楽しむことが幸運を呼びます。", "自分の人生を自由に選び責任を持つほど、表現が社会に活きます。", "軽やかに動ける分、ひとつのことを続けるのが課題になりやすいようです。"], ["どう生きたいかを言葉にすれば、迷いは自由な選択に変わります。", "感じたものを表現に変え、滞りを軽やかに解き放てます。", "本音をうまく出せないと、そのまま周りに流されやすくなるところがあります。"], ["自由を責任とともに使えば、人を解き放つ表現者になれます。", "枠を超えた発想で、停滞した場に新しい風を通せます。", "責任からそっと距離を取り、方向を見失って彷徨いやすい面があります。"], ["本音を出す場を持つほど、抱えた重さは軽やかさに変わります。", "ハートの声を形にし、人を自由へ導く創造力があります。", "表現する場を失うと、内側に思いを抱え込みやすくなるところがあります。"], ["自分軸でいられるとき、ハートと表現が一つになり、人を自由へ導く創造者になります。", "ハートからの表現力が、人を自由へ解き放つ才能になります。", "自由のバランスが乱れると、再び迷いの中に入りやすくなることがあります。"]], "ブルー": [["穏やかで信頼される主人格。生まれ持った才能を活かし、平和と安らぎをもたらすタイプです。", "空のブルーは守りと信頼、海のブルーは育みと滋養を表し、両方の意味を含みます。", "まじめに受け止める分、つい肩に力が入りすぎてしまう面があります。"], ["信頼してブループリントを受け取り、才能を表現することで着実に自己実現していきます。", "生まれ持った才能（ギフト）を信頼して受け取り、表していきます。", "慎重に構えるあまり、進み出すまでに時間がかかってしまうことがあります。"], ["無意識の奥に、天から守られているという安心と、伝え導こうとする使命感が働いています。", "無意識の奥に、天から守られているという安心が流れています。", "責任感が強く、何でもひとりで抱え込みやすいところがあります。"], ["青空のようにすっきりした思考で、よく聴き相手を認める誠実な伝え方をします。", "すっきりした思考で、相手をよく聴き認める誠実さがあります。", "正しさが先に立つと、言葉が硬くなって伝わりにくくなることがあります。"], ["無条件に許し受け止める、静かで安定した信頼の愛し方をします。", "多くを求めず、静かに受け止め信じ続ける関わりを選びます。", "多くを語らない分、相手との間に距離が生まれやすい一面があります。"], ["静謐・清らかさ・調和に美を感じます。落ち着いた品格のあるものを好みます。", "静謐・清らかさ・端正さといった落ち着いた美を好みます。", "端正さを求めるあまり、遊びや余白を許しにくくなるところがあります。"], ["努力を着実に積み重ね、穏やかに信念をもって動くエネルギーがあります。", "派手さより、努力を着実に積み重ねる粘りで前へ進みます。", "堅実さを大切にする分、変化への一歩が重く感じられることがあります。"], ["内側が平和であるほど発展します。必要なときに必要なものが来ると信頼することが幸運を呼びます。", "内側が平和であるほど、必要なものが必要な時に巡ります。", "枠を守りすぎて、世界を広げる伸びやかさを欠いてしまう面があります。"], ["手放し委ねられたとき、こだわりは大きな柔軟さに変わります。", "誠実に聴き受け止める力で、対立も静かにほどけます。", "古い価値観や「正しさ」に、つい強く縛られやすいところがあります。"], ["価値観を分かち合いに使えば、人を導く誠実な力になります。", "ぶれない信念で、周囲に安心と方向を示せます。", "善悪で物事を見て、合わない相手をそっと遠ざけてしまう面があります。"], ["本来は内なる平和を基準に、伸びやかに立てる人です。", "才能を信頼して表すほど、道は静かに着実に開けます。", "世間体やルールに縛られて、現実の手ごたえが薄れてしまうことがあります。"], ["自分軸でいられるとき、揺るがぬ平和を保ち、人を罪悪感から解放し導く人になります。", "静かな信頼が、人を罪悪感から解き放つ力になります。", "信頼が揺らぐと、再び自分の枠の中に閉じこもりやすくなります。"]], "ロイヤルブルー": [["鋭い直感と深い感受性を持つ主人格。見えないものを見通し、人の心を支えるタイプです。", "ブルーが深まった深海と夜空の色で、見えないものを映します。", "物事を深く感じ取る分、内側にこもりやすくなる面があります。"], ["研ぎ澄まされた感性と洞察を現実に落とし込み、人の目覚めを促して自己実現していきます。", "高い感受性と高いコミュニケーション能力を併せ持ちます。", "深く見極めようとするあまり、動き出しが遅れてしまうことがあります。"], ["無意識の奥に、深く見て深く聴き感じ取る、宇宙と繋がる感性が働いています。", "無意識の奥で、宇宙や高次とのつながりが静かに働いています。", "世界を深く捉えすぎて、心が重たくなりやすいところがあります。"], ["物事の深みと本質を直感で感じ取り、高い感受性で繊細に伝えます。", "物事の深みと本質を直感で掴み、繊細な言葉で届けます。", "繊細に感じ取る分、それを言葉にするまでに時間がかかる一面があります。"], ["相手の根深い思いまで感じ取り、静かに寄り添い応援する愛し方をします。", "相手の根深い思いまで感じ取り、静かに寄り添い続けます。", "相手の機微を拾いすぎて、知らぬ間に疲れてしまうことがあるようです。"], ["神秘・深遠・静かな奥行きに美を感じます。夜空のような深い世界を好みます。", "神秘・深遠・夜空のような奥行きに美を感じます。", "奥行きや深さを求める分、軽やかさが少し遠のいてしまうところがあります。"], ["ふと降りるインスピレーションを実行に移すとき、本領が発揮されます。", "理屈より、ふと降りるインスピレーションを起点に動きます。", "理屈より直感で動く分、後からの説明が後回しになりやすいところがあります。"], ["直感を信じ、勇気を出して現実へ踏み出すほど発展します。内なる声に従うことが幸運を呼びます。", "内なる声と直感を信じるほど、進む道が深く定まります。", "慎重に構えすぎて、せっかくの機会を逃してしまうことがあるようです。"], ["直感を信じ一歩外へ出れば、繊細さは人を導く洞察になります。", "複雑さを観察に変えれば、その深さは人を救う知恵になります。", "繊細さからつい引きこもり、考えが混乱しやすくなる面があります。"], ["閉じこもらず分かち合えば、その感性は人を支える光になります。", "本質を見抜く眼で、絡まった問題の核心を捉えられます。", "物事を複雑に捉えすぎて、自分の世界に閉じこもりやすいところがあります。"], ["本来は自分の感覚を信頼し、深く立てる人です。", "見えないものを見通し、人の目覚めを促す力を備えています。", "周囲のネガティブな空気を拾い、臆病になりやすいところがあります。"], ["自分軸でいられるとき、深い洞察が人を導く光となり、絡まった問題を解きほぐす人になります。", "鋭い洞察が、絡まった問題を解きほぐす導きの光になります。", "自分の感覚をふと疑うと、再び迷いの中に入りやすくなります。"]], "ヴァイオレット": [["高貴で霊性の高い主人格。二極を統合し、変容と新しい風をもたらすカリスマ性を持つタイプです。", "虹の最後、最も高く細やかな波動を持つ色です。", "理想が高く澄んでいる分、現実から少し浮きやすい面があります。"], ["人生の使命を実践し奉仕することで、天の意志を地上に具現化し自己実現していきます。", "レッドとブルーを含み、天と地・陰陽・思考と直感を統合します。", "使命を急ぐあまり、足元のことが留守になりやすいところがあります。"], ["無意識の奥に、闇を受け止め高い質へ変容させようとする統合の力が働いています。", "無意識の奥で、闇を受け止め高い質へ変える働きが動いています。", "深い感情にふと飲まれて、心が大きく揺れやすいところがあります。"], ["相反する二つを統合し、第三の答えを導き出す独創的な捉え方・伝え方をします。", "相反する二つから、第三の答えを導く独創性があります。", "発想が独自的で豊かな分、人に伝わりにくくなることがあるようです。"], ["高い視点から包み込み、相手の変容を促す献身的な愛し方をします。", "高い視点から包み込み、相手の変容をそっと後押しします。", "高い視点から包む分、相手との間に距離が生まれやすい一面があります。"], ["神聖さ・気高さ・斬新さに美を感じます。芸術的で精妙な世界を好みます。", "神聖さ・気高さ・斬新さの同居した、精妙な美を好みます。", "精妙な美しさを求めるあまり、現実の手触りを遠ざけがちなところがあります。"], ["機能しないものを壊して変容させ、新しい扉を開くエネルギーがあります。", "機能しないものを壊し、新しい形へ変容させて動きます。", "機能しないものを壊して変えたくなり、安定を欠きやすい面があります。"], ["闇の側面も受け止め高い質へ変容させるほど発展します。使命を生きることが幸運を呼びます。", "闇の側面も受け止め変容させるほど、可能性が開きます。", "可能性を広げすぎて、地に足がつきにくくなってしまうことがあります。"], ["地に足をつけたとき、その高い感性は確かな創造力になります。", "闇も受け止め変容させる、再生のプロセスを生きられます。", "現実から離れて、逃避や幻想のほうへ傾きやすいところがあります。"], ["孤立を独自性に変えれば、人を率いるカリスマになります。", "二極を統合し、第三の答えを示せる稀有な発想力があります。", "変わり者と見られることがあり、つい孤立しやすい面があります。"], ["本来は今ここに根を下ろし、使命を生きられる人です。", "新しい風をもたらし、停滞を変容させる力を備えています。", "自分の居場所が不確かに感じられ、理由のない悲しみに揺れやすいところがあります。"], ["自分軸でいられるとき、二極が調和し、天と地を結ぶ変容のリーダーになります。", "二極を統合する力が、天と地を結ぶ変容の導きになります。", "根が浮いてしまうと、再び現実から離れやすくなるところがあります。"]], "マゼンタ": [["細やかな愛と配慮で人をケアする主人格。日常の小さなことに神聖さと美を見出すタイプです。", "レッドとヴァイオレット、最も低い波動と最も高い波動の間にあります。", "人を優先する気持ちが強く、自分の存在が薄れてしまいやすい面があります。"], ["目の前の人の必要を満たし、日常に愛を注ぐことで多くの可能性を開き自己実現していきます。", "虹には見えなくても、すべての色＝無限の可能性を含む色です。", "尽くしているうちに、自分の本当の願いを見失いやすいところがあります。"], ["無意識の奥に、すべてを包み込み癒す、人類愛にも通じる大きな愛が働いています。", "無意識の奥で、すべてを包み癒す大きな愛が流れています。", "すべてを包み込もうとして、知らぬ間に疲れを溜めやすいところがあります。"], ["周りの空気と細部によく気づき、相手のニーズを汲んで思いやり深く伝えます。", "細部と空気によく気づき、相手の必要を汲んで言葉を選びます。", "気を回しすぎて、言葉を選びすぎてしまうことがあるようです。"], ["慈愛に基づき、相手の必要に応えて尽くす献身的な愛し方をします。", "慈愛に基づき、目の前の人の必要を満たそうと尽くします。", "相手の必要を優先するあまり、自分のことを後回しにしがちな面があります。"], ["日常の中の神聖さと小さな美に気づく、繊細で温かい美意識を持ちます。", "日常の小さな物事の中に、神聖さと美を見出す感性があります。 function digitSum(n){return String(n).split('').reduce((a,c)=>a+(+c||0),0);}
function unmeisu(y,m,d){
  let s=digitSum(y)+digitSum(m)+digitSum(d);
  while(s>12 && s!==22 && s!==33 && s!==44) s=digitSum(s);
  return s; // D2 (運命数)
}
function reducedUnmei(u){return u===22?10:u===33?9:u===44?8:u;} // D3
function signIndex(name){return SIGNS.indexOf(name);}            // 0..11
function signNum(name){return signIndex(name)+1;}                // 1..12
function colorBySign(name){return COLOR_ORDER[(signNum(name)-1)%12];} // E4:E10 absolute

// astronomy: JST(UTC+9) -> UTC
function planetSigns(y,m,d,hh,mm){
  const utc=new Date(Date.UTC(y,m-1,d,hh,mm,0));
  utc.setUTCHours(utc.getUTCHours()-9);              // JST -> UTC
  const tt=Astronomy.MakeTime(utc);
  const elon=b=>Astronomy.Ecliptic(Astronomy.GeoVector(b,tt,true)).elon;
  const sg=L=>SIGNS[Math.floor((((L%360)+360)%360)/30)];
  return {
    "太陽":sg(elon(Astronomy.Body.Sun)),
    "月":sg(Astronomy.EclipticGeoMoon(tt).lon),
    "水星":sg(elon(Astronomy.Body.Mercury)),
    "金星":sg(elon(Astronomy.Body.Venus)),
    "火星":sg(elon(Astronomy.Body.Mars)),
    "木星":sg(elon(Astronomy.Body.Jupiter)),
    "土星":sg(elon(Astronomy.Body.Saturn))
  };
}

function compute(planets,unmei){
  const D3=reducedUnmei(unmei);
  const I2=signNum(planets["月"]);          // 月の星座番号
  const I3=I2+(D3-1);
  const base0=I3-1;                          // 0-based wheel offset
  const numToSign=h=>SIGNS[((base0+(h-1))%12+12)%12];        // H->sign
  const wheelNum=sign=>(((signIndex(sign)-base0)%12)+12)%12+1; // sign->H (1..12)
  const colorOfNum=h=>COLOR_ORDER[(((base0+(h-1))%12)+12)%12]; // J: number->color
  const reduce=v=>v>=13?Math.floor(v/10)+v%10:v;
  const wn=s=>wheelNum(s);
  const male  = wn("うお座")+wn(planets["火星"])+wn(planets["太陽"])+wn(planets["金星"])+wn("おとめ座");
  const female= wn("さそり座")+wn(planets["木星"])+wn(planets["太陽"])+wn(planets["水星"])+wn("おうし座");
  const integ = wn("やぎ座")+wn(planets["土星"])+wn(planets["太陽"])+wn(planets["月"])+wn("かに座");
  function pack(raw){const n=reduce(raw);const c=(n>=1&&n<=12)?colorOfNum(n):null;return{raw,n,color:c};}
  const per={};
  for(const p in planets){per[p]={sign:planets[p],color:colorBySign(planets[p]),wnum:wheelNum(planets[p])};}
  return {D3,I2,I3,base0,numToSign,wheelNum,per,
          male:pack(male),female:pack(female),integ:pack(integ)};
}

function txtColor(hex){
  const r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);
  return (0.299*r+0.587*g+0.114*b)>150?"#2a2520":"#ffffff";
}
function circleText(cx,cy,lines){ // lines:[{t,f,col,b}]
  const lh=l=>l.f*1.32;
  const tot=lines.reduce((a,l)=>a+lh(l),0);
  let y=cy-tot/2;
  let out="";
  for(const l of lines){
    y+=lh(l);
    out+=`<text x="${cx.toFixed(1)}" y="${(y-l.f*0.32).toFixed(1)}" text-anchor="middle" `+
         `font-size="${l.f}" fill="${l.col}"${l.b?' font-weight="700"':''}>${l.t}</text>`;
  }
  return out;
}
function buildDiagram(planets,res,unmei){
  const X=v=>v*S, R=0.605*S, RC=0.64*S;
  let s=`<svg class="fol" viewBox="0 86 525 654" xmlns="http://www.w3.org/2000/svg">`;
  // 12サイン円：元pptx座標で密着配置・絶対カラー（内側と同じ色味）
  for(const [sg,gx,gy] of SIGN_POS){
    const cn=colorBySign(sg), hx=COLORDATA[cn].hex, tc=txtColor(hx);
    s+=`<circle cx="${X(gx)}" cy="${X(gy)}" r="${R}" fill="${hx}" stroke="rgba(0,0,0,.12)"/>`;
    s+=circleText(X(gx),X(gy),[
      {t:sg,f:13,col:tc,b:1},{t:cn,f:11,col:tc}]);
  }
  // 7天体（固定位置・算出カラー）— 中心=太陽
  for(const p in PLANET_POS){
    const [gx,gy,mean,isC]=PLANET_POS[p];
    const cn=res.per[p].color, hx=COLORDATA[cn].hex, tc=txtColor(hx), rr=isC?RC:R;
    s+=`<circle cx="${X(gx)}" cy="${X(gy)}" r="${rr}" fill="${hx}" stroke="rgba(0,0,0,.15)"/>`;
    const L=mean.map(m=>({t:m,f:9.5,col:tc}));
    L.push({t:cn,f:10.5,col:tc});
    L.push({t:p,f:10,col:tc,b:1});
    s+=circleText(X(gx),X(gy),L);
  }
  // 四隅：男性／女性／統合色数・運命数
  function corner(lx,ly,cxv,cyv,lab,pack){
    let o=`<text x="${X(cxv)}" y="${X(ly).toFixed(1)}" text-anchor="middle" font-size="13" fill="#8a7f76">${lab}</text>`;
    const hx=pack.color?COLORDATA[pack.color].hex:"#fffdf9";
    const tc=pack.color?txtColor(hx):"#8a6d3f";
    o+=`<circle cx="${X(cxv)}" cy="${X(cyv)}" r="${R}" fill="${hx}" stroke="rgba(0,0,0,.15)"/>`;
    o+=circleText(X(cxv),X(cyv),pack.color?
      [{t:pack.color,f:12,col:tc,b:1},{t:"色数 "+pack.n,f:10,col:tc}]
      :[{t:"—",f:13,col:tc}]);
    return o;
  }
  s+=corner(0.67,1.46,0.67,2.30,"男性色数",res.male);
  s+=corner(6.76,1.46,6.76,2.30,"女性色数",res.female);
  s+=corner(3.77,8.78,3.77,9.62,"統合色数",res.integ);
  // 運命数（数字）
  s+=`<text x="${X(6.48)}" y="${X(8.78).toFixed(1)}" text-anchor="middle" font-size="13" fill="#8a7f76">運命数</text>`;
  s+=`<circle cx="${X(6.48)}" cy="${X(9.62)}" r="${R}" fill="#fbf4e3" stroke="#dcd0bb"/>`;
  s+=`<text x="${X(6.48)}" y="${(X(9.62)+9).toFixed(1)}" text-anchor="middle" font-size="26" font-weight="700" fill="#8a6d3f">${unmei}</text>`;
  s+=`</svg>`;
  return s;
}

function sumRow(lab,pack){
  if(!pack.color) return `<div class="sumrow"><div class="lab">${lab}</div><div class="val">—</div><div class="num">${pack.n}</div></div>`;
  const hex=COLORDATA[pack.color].hex;
  return `<div class="sumrow"><span class="swatch" style="background:${hex}"></span>
    <div><div class="lab">${lab}</div><div class="val">${pack.color}</div></div>
    <div class="num">${pack.n}</div></div>`;
}

// PDF保存名＝お名前（印刷ダイアログのファイル名は document.title 由来）
function doPrint(){
  const orig=document.title;
  document.title=(window._pdfFile||'神聖色数鑑定');
  const restore=()=>{document.title=orig;window.removeEventListener('afterprint',restore);};
  window.addEventListener('afterprint',restore);
  window.print();
}

function readingBlock(cat,colorName,ti){
  const cd=COLORDATA[colorName]; if(!cd) return "";
  const hex=cd.hex;
  const rb=(RBDATA[colorName]&&RBDATA[colorName][ti])||[cd.desc,"",""];
  const p1=rb[0]||"", p2=rb[1]||"", ng=rb[2]||"";
  const up=(MSG2DATA[colorName]&&MSG2DATA[colorName][ti])||"";
  return `<div class="read">
    <div class="read-head" style="background:${hex}1f;border-bottom:1px solid ${hex}55">
      <span class="cat">${cat}</span>
      <span class="cn"><span class="sw" style="background:${hex}"></span>${colorName}<span style="color:#a99">（${cd.eng}）</span></span>
    </div>
    <div class="read-body">
      <div class="tagline">${cd.tagline}</div>
      ${p1?`<p class="desc">${p1}</p>`:""}
      ${p2?`<p class="desc">${p2}</p>`:""}
      ${ng?`<p class="desc soft">${ng}</p>`:""}
      ${up?`<div class="advice">${up}</div>`:""}
    </div></div>`;
}

$('go').addEventListener('click',()=>{
  const err=$('err'); err.style.display='none';

  if(!dv){err.textContent='生年月日を入力してください。';err.style.display='block';return;}
  const [y,m,d]=dv.split('-').map(Number);
  const unknown=$('f_unknown').checked;
  let hh=12,mm=0,timeNote='';
  if(unknown){timeNote=' （出生時刻不明のため12:00で計算）';}
  else{
    const tv=$('f_time').value;
    if(!tv){err.textContent='出生時刻を入力するか「出生時刻が不明」にチェックしてください。';err.style.display='block';return;}
    [hh,mm]=tv.split(':').map(Number);
  }
  let planets;
  try{ planets=planetSigns(y,m,d,hh,mm); }
  catch(e){ err.textContent='天体計算でエラー: '+e.message; err.style.display='block'; return; }
  const unmei=unmeisu(y,m,d);
  const res=compute(planets,unmei);

  const title=$('f_title').value;
  const disp=name?(name+title):'（お名前未入力）';
  window._pdfFile=((name?name+title:'神聖色数鑑定')).replace(/[\\\/:*?"<>|]/g,'').trim()||'神聖色数鑑定';
  const tstr=unknown?'不明':String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  const slots={"太陽":res.per["太陽"].color,"月":res.per["月"].color,"水星":res.per["水星"].color,
    "金星":res.per["金星"].color,"火星":res.per["火星"].color,"木星":res.per["木星"].color,"土星":res.per["土星"].color,
    "__male":res.male.color,"__female":res.female.color,"__integ":res.integ.color};

  let html=`<div class="pdfbar">
      <button class="pdfbtn" onclick="doPrint()">📄 PDFで保存・印刷</button>
    </div>
    <div class="card">

      <span>お名前：<b>${disp}</b></span>
      <span>生年月日：<b>${y}年${m}月${d}日 ${tstr}</b></span>
      <span>出生場所：<b>${$('f_pref').value}</b></span>
      <span>鑑定日：<b>${$('f_jdate').value||'—'}</b></span>
      <span>鑑定者：<b>${$('f_reader').value||'—'}</b></span>
    </div>
    <div class="sec-title fig">神 聖 色 数 図</div>
    <div class="diagram-wrap">
      ${buildDiagram(planets,res,unmei)}
    </div>
    <div class="note" style="text-align:center">${timeNote}</div>
  </div>`;

  html+=`<div class="sec-title">鑑 定 結 果</div>`;
  CATEGORIES.forEach(([cat,key],ti)=>{
    const cn=slots[key];
    if(!cn){html+=`<div class="read"><div class="read-body"><b>${cat}</b><p class="desc">この項目は算出範囲外でした。</p></div></div>`;return;}
    html+=readingBlock(cat,cn,ti);
  });
  html+=`<div class="disclaimer">
    ※ 本鑑定はいろみずきカラー協会「神聖色数」に基づき、神聖幾何学フルーツ・オブ・ライフと天体位置・カバラ数秘・占星学を用いて作成しています。</div>
    <div class="pdfbar" style="justify-content:center;margin-top:16px">
      <button class="pdfbtn" onclick="doPrint()">📄 PDFで保存・印刷</button>
    </div>
    <div class="note" style="text-align:center">「PDFで保存・印刷」を押すと印刷ダイアログが開きます。送信先で「PDFに保存」を選ぶとPDFファイルになります（用紙A4推奨）。</div>`;

  const R=$('result'); R.innerHTML=html; R.style.display='block';
  R.scrollIntoView({behavior:'smooth'});
});
